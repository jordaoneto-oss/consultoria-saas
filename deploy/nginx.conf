# ============================================================
# Consultoria SaaS - Nginx Configuration (Production)
# ============================================================

upstream php-fpm {
    server unix:/var/run/php/php8.2-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name consultoriasaas.com.br www.consultoriasaas.com.br;

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name consultoriasaas.com.br www.consultoriasaas.com.br;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/consultoriasaas.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/consultoriasaas.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/html;
    index index.php;

    access_log /var/log/nginx/consultoria-access.log;
    error_log  /var/log/nginx/consultoria-error.log;

    # WordPress pretty URLs
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize = 128M \n post_max_size = 128M";
        include fastcgi_params;
    }

    # Static assets - long cache
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Deny sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /wp-config.php {
        deny all;
    }

    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /readme.html {
        deny all;
    }

    # WP content uploads
    location ~* /wp-content/uploads/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # WooCommerce compatibility
    location = /wc-api/ {
        try_files $uri $uri/ /index.php?$args;
    }

    # REST API
    location /wp-json/ {
        try_files $uri $uri/ /index.php?$args;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK";
    }
}
