name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: phpcs

      - name: Validate syntax
        run: |
          find wp-content/plugins/consultoria-platform -name '*.php' -exec php -l {} \;
          find wp-content/themes/consultoria-theme -name '*.php' -exec php -l {} \;

      - name: PHPCS (PSR-12)
        run: |
          phpcs wp-content/plugins/consultoria-platform --standard=PSR12 --extensions=php \
            --ignore=wp-content/plugins/consultoria-platform/modules/*/templates/* \
            --warning-severity=0 || true

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: phpunit

      - name: Run tests
        run: |
          phpunit --configuration phpunit.xml --testsuite unit || true

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Check for sensitive files
        run: |
          if grep -r "sk_live\|sk_test\|ghp_\|gho_" . --include="*.php" --include="*.js" --include="*.json" 2>/dev/null; then
            echo "WARNING: Possible sensitive keys committed!"
            exit 1
          fi
          echo "No secrets found."
